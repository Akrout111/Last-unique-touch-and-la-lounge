name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref/PR to save CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Provide a placeholder DB / secrets so typecheck and build can resolve env reads.
      # These do NOT run a real server — they only satisfy build-time inline env access.
      DATABASE_URL: 'file:./prisma/db/ci.db'
      SESSION_SECRET: 'ci-placeholder-session-secret-32-chars-min'
      PAYMENT_WEBHOOK_SECRET: 'ci-placeholder-secret'
      ADMIN_PASSWORD: ''
      NODE_ENV: 'production'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache .next/cache
        uses: actions/cache@v6
        with:
          path: |
            .next/cache
            .next/standalone
          key: ${{ runner.os }}-nextcache-${{ hashFiles('bun.lock', 'next.config.ts', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-nextcache-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
